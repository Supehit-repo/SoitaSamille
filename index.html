<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Soita Samille</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111313;
      --panel-soft: #222624;
      --text: #f4efe7;
      --muted: #b9b0a3;
      --red: #9f241f;
      --red-strong: #c7372e;
      --brass: #c79b45;
      --green: #75d3a2;
      --line: rgba(244, 239, 231, 0.16);
      --shadow: rgba(0, 0, 0, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 22% 18%, rgba(199, 155, 69, 0.18), transparent 28rem),
        linear-gradient(140deg, #101413 0%, #171817 44%, #241716 100%);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    button {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      align-items: stretch;
      padding: clamp(1rem, 2.8vw, 2.6rem);
    }

    .stage {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(360px, 1fr) auto;
      gap: 1rem;
      width: min(100%, 980px);
      margin: 0 auto;
      position: relative;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.8rem;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(2.1rem, 6vw, 5.6rem);
      line-height: 0.92;
      letter-spacing: 0;
      text-transform: uppercase;
      max-width: 11ch;
      overflow-wrap: anywhere;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      min-height: 2.5rem;
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(17, 19, 19, 0.48);
      white-space: nowrap;
    }

    .status-dot {
      width: 0.72rem;
      height: 0.72rem;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 0 0 rgba(117, 211, 162, 0);
    }

    .is-listening .status-dot,
    .is-thinking .status-dot {
      background: var(--green);
      animation: pulse 1.1s ease-out infinite;
    }

    .is-speaking .status-dot {
      background: var(--brass);
      animation: pulse 1.1s ease-out infinite;
    }

    .phone-button {
      align-self: center;
      justify-self: center;
      width: min(76vw, 700px);
      max-width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      padding: clamp(0.3rem, 2vw, 1.2rem);
      border: 0;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      position: relative;
      filter: drop-shadow(0 2rem 1.7rem var(--shadow));
      transition: transform 140ms ease, filter 140ms ease;
    }

    .phone-button::before {
      content: "";
      position: absolute;
      inset: 7%;
      border: 2px solid rgba(199, 155, 69, 0.18);
      border-radius: 50%;
      transform: scale(0.86);
      opacity: 0;
      pointer-events: none;
    }

    .phone-button:hover {
      transform: translateY(-2px) rotate(-0.4deg);
    }

    .phone-button:focus-visible {
      outline: 3px solid var(--brass);
      outline-offset: 6px;
    }

    .phone-button:active {
      transform: translateY(1px) scale(0.99);
    }

    .phone-button img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }

    .is-listening .phone-button::before,
    .is-speaking .phone-button::before {
      opacity: 1;
      animation: ring 1.25s ease-out infinite;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      align-items: center;
      justify-content: center;
      padding-top: 0.5rem;
    }

    .control-button {
      min-width: 9rem;
      min-height: 2.8rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
      color: var(--text);
      padding: 0.7rem 1rem;
      cursor: pointer;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.16);
    }

    .control-button.primary {
      border-color: rgba(199, 155, 69, 0.58);
      background: linear-gradient(180deg, var(--red-strong), var(--red));
    }

    .control-button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      box-shadow: none;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(117, 211, 162, 0.44);
      }
      100% {
        box-shadow: 0 0 0 0.8rem rgba(117, 211, 162, 0);
      }
    }

    @keyframes ring {
      0% {
        transform: scale(0.82);
        opacity: 0.74;
      }
      100% {
        transform: scale(1.12);
        opacity: 0;
      }
    }

    @media (max-width: 860px) {
      .app {
        padding: 1rem;
      }

      .stage {
        grid-template-rows: auto auto auto;
      }

      .brand {
        align-items: flex-start;
      }

      .status {
        white-space: normal;
        justify-content: flex-end;
      }

      .phone-button {
        width: min(88vw, 540px);
      }
    }

    @media (max-width: 520px) {
      .brand {
        display: grid;
      }

      h1 {
        font-size: clamp(1.65rem, 9vw, 2.6rem);
        max-width: 100%;
      }

      .controls {
        justify-content: stretch;
      }

      .control-button {
        flex: 1 1 9rem;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <section class="stage" aria-label="Soita Samille">
      <div class="brand">
        <h1>Soita Samille</h1>
        <div class="status" role="status" aria-live="polite">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="statusText">Linja vapaa</span>
        </div>
      </div>

      <button class="phone-button" id="phoneButton" title="Soita" aria-label="Soita Samille">
        <img src="assets/rotary-phone.png" alt="">
      </button>

      <div class="controls">
        <button class="control-button primary" id="callButton" type="button">Soita</button>
        <button class="control-button" id="repeatButton" type="button" disabled>Toista</button>
        <button class="control-button" id="stopButton" type="button">Lopeta</button>
      </div>
    </section>
  </main>

  <script>
    const app = document.getElementById("app");
    const statusText = document.getElementById("statusText");
    const phoneButton = document.getElementById("phoneButton");
    const callButton = document.getElementById("callButton");
    const repeatButton = document.getElementById("repeatButton");
    const stopButton = document.getElementById("stopButton");

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const silentWav = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=";
    const audioPlayer = new Audio();
    audioPlayer.preload = "auto";
    audioPlayer.playsInline = true;
    audioPlayer.setAttribute("playsinline", "");
    audioPlayer.style.display = "none";
    document.body.appendChild(audioPlayer);
    const greeting = "Sami.. mitä nyt?";

    let recognition = null;
    let lastReply = "";
    let busy = false;
    let callActive = false;
    let currentAudioUrl = "";
    let currentAudioResolve = null;
    let recentReplies = [];
    let audioUnlocked = false;
    let recentErrorReplies = [];

    function pickClientLine(candidates) {
      const fresh = candidates.filter((candidate) => !recentErrorReplies.includes(candidate));
      const line = fresh.length ? fresh[Math.floor(Math.random() * fresh.length)] : candidates[Math.floor(Math.random() * candidates.length)];
      recentErrorReplies.push(line);
      recentErrorReplies = recentErrorReplies.slice(-20);
      return line;
    }

    function isLocalAccess() {
      return ["localhost", "127.0.0.1", "::1"].includes(window.location.hostname);
    }

    function assertBrowserCanUseMic() {
      if (!window.isSecureContext && !isLocalAccess()) {
        throw new Error("insecure_context");
      }
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error("media_api_missing");
      }
      if (!SpeechRecognition) {
        throw new Error("speech_recognition_missing");
      }
    }

    function setState(state, text) {
      app.classList.toggle("is-listening", state === "listening");
      app.classList.toggle("is-thinking", state === "thinking");
      app.classList.toggle("is-speaking", state === "speaking");
      statusText.textContent = text;
      callButton.disabled = busy;
      phoneButton.disabled = busy;
      repeatButton.disabled = busy || !lastReply;
    }

    function stopAudio() {
      if (currentAudioResolve) {
        currentAudioResolve();
        currentAudioResolve = null;
      }
      audioPlayer.pause();
      audioPlayer.removeAttribute("src");
      audioPlayer.load();
      if (currentAudioUrl) {
        URL.revokeObjectURL(currentAudioUrl);
        currentAudioUrl = "";
      }
    }

    async function unlockAudio() {
      if (audioUnlocked) return;

      try {
        audioPlayer.muted = true;
        audioPlayer.src = silentWav;
        await audioPlayer.play();
        audioPlayer.pause();
        audioPlayer.currentTime = 0;
        audioPlayer.muted = false;
        audioUnlocked = true;
      } catch {
        audioPlayer.muted = false;
      }
    }

    async function speak(text) {
      stopAudio();
      setState("speaking", "Linja puhuu");

      const response = await fetch("/api/speech", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });

      if (!response.ok) {
        throw new Error("tts_failed");
      }

      const blob = await response.blob();
      currentAudioUrl = URL.createObjectURL(blob);
      audioPlayer.src = currentAudioUrl;
      audioPlayer.preload = "auto";
      audioPlayer.volume = 1;
      audioPlayer.muted = false;

      await new Promise((resolve, reject) => {
        const done = () => {
          currentAudioResolve = null;
          resolve();
        };
        currentAudioResolve = done;
        audioPlayer.onended = done;
        audioPlayer.onerror = () => {
          currentAudioResolve = null;
          reject(new Error("audio_playback_failed"));
        };
        audioPlayer.play().catch((error) => {
          currentAudioResolve = null;
          reject(error);
        });
      });

      stopAudio();
    }

    async function safeSpeak(text) {
      try {
        await speak(text);
      } catch {
        setState("idle", "TTS poikki");
      }
    }

    async function requestMicPermission() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach((track) => track.stop());
        return { ok: true };
      } catch (error) {
        if (error.name === "NotAllowedError" || error.name === "PermissionDeniedError" || error.name === "SecurityError") {
          throw new Error("mic_not_allowed");
        }
        return { ok: false, reason: error.name || "mic_probe_failed" };
      }
    }

    function listenOnce() {
      return new Promise((resolve, reject) => {
        if (!SpeechRecognition) {
          reject(new Error("speech_recognition_missing"));
          return;
        }

        recognition = new SpeechRecognition();
        recognition.lang = "fi-FI";
        recognition.interimResults = true;
        recognition.continuous = false;
        recognition.maxAlternatives = 1;

        let finalText = "";
        let interimText = "";
        let settled = false;

        const fail = (message) => {
          if (settled) return;
          settled = true;
          reject(new Error(message));
        };

        const finish = (transcript) => {
          if (settled) return;
          settled = true;
          resolve(transcript);
        };

        recognition.onresult = (event) => {
          interimText = "";
          for (let i = event.resultIndex; i < event.results.length; i += 1) {
            const part = event.results[i][0].transcript.trim();
            if (event.results[i].isFinal) finalText += `${part} `;
            else interimText += `${part} `;
          }
        };

        recognition.onerror = (event) => {
          if (event.error === "not-allowed" || event.error === "service-not-allowed") {
            fail("mic_not_allowed");
            return;
          }
          if (event.error === "audio-capture") {
            fail("mic_unavailable");
            return;
          }
          if (event.error === "no-speech") {
            fail("empty_transcript");
            return;
          }
          fail("speech_recognition_error");
        };
        recognition.onend = () => {
          if (settled) return;
          const transcript = (finalText || interimText).trim();
          if (transcript) finish(transcript);
          else fail("empty_transcript");
        };

        setState("listening", "Kuuntelee");
        try {
          recognition.start();
        } catch {
          fail("speech_recognition_error");
        }
      });
    }

    async function roast(transcript) {
      setState("thinking", "Miettii vastausta");
      const response = await fetch("/api/roast", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ transcript, recentReplies }),
      });

      if (!response.ok) throw new Error("roast_failed");
      return response.json();
    }

    async function handleTranscript(transcript) {
      const data = await roast(transcript);
      lastReply = data.reply;
      recentReplies.push(data.reply);
      recentReplies = recentReplies.slice(-80);
      await speak(data.reply);
    }

    function spokenError(error) {
      switch (error.message) {
        case "empty_transcript":
          return pickClientLine([
            "Et sanonut mitään. Vihdoinkin harkintaa.",
            "Hiljaisuus oli tähän asti paras osuutesi.",
            "Jos mietit, jatka samaa harvinaisuutta.",
            "Sano jotain, jos ajatus löytyy.",
          ]);
        case "insecure_context":
          return "Avaa HTTPS-linkki. HTTP ei saa mikkiä.";
        case "media_api_missing":
          return "Tämä selain piilottaa mikin. Hyvä alku.";
        case "speech_recognition_missing":
          return "Tämä selain ei ymmärrä puheohjausta. Ei siis ihme, että sovitte yhteen.";
        case "mic_not_allowed":
          return "Salli mikki pop-upista. Ei tämä ajatuksia lue.";
        case "mic_unavailable":
          return "";
        case "tts_failed":
        case "audio_playback_failed":
          return "";
        case "roast_failed":
          return pickClientLine([
            "Vastaus hajosi. Sopii keskustelun tasoon.",
            "Palvelin nikotteli, eli samaa sarjaa.",
            "Hetki meni hukkaan. Sinulta tuttua.",
            "Tuo rikkoi jopa vastauspuolen.",
          ]);
        default:
          return pickClientLine([
            "Linja yskii. Yritä nyt edes selvästi.",
            "Puhelu kompastui. Ei ihme tällä sisällöllä.",
            "Tekniikka häiriintyi kysymyksestäsi.",
            "Jokin meni poikki. Aloita ajattelusta.",
            "Häiriö linjalla, tai sitten sinussa.",
          ]);
      }
    }

    async function beginCall() {
      if (busy) return;
      busy = true;
      callActive = true;
      let finalStatus = "Linja vapaa";

      try {
        await unlockAudio();
        assertBrowserCanUseMic();
        setState("thinking", "Pyydetään mikkiä");
        const micProbe = await requestMicPermission();
        await speak(greeting);
        while (callActive) {
          try {
            const transcript = await listenOnce();
            if (!callActive) break;
            await handleTranscript(transcript);
          } catch (error) {
            if (!callActive) break;
            if (error.message === "speech_recognition_missing" || error.message === "mic_not_allowed" || error.message === "mic_unavailable") {
              throw error;
            }
            const line = spokenError(error);
            if (line) await safeSpeak(line);
            await new Promise((resolve) => setTimeout(resolve, 300));
          }
        }
      } catch (error) {
        const line = spokenError(error);
        if (line) await safeSpeak(line);
        if (error.message === "mic_not_allowed") {
          finalStatus = "Salli mikki ja paina Soita";
        } else if (error.message === "insecure_context") {
          finalStatus = "Avaa HTTPS-linkillä";
        } else if (error.message === "media_api_missing") {
          finalStatus = "Selain ei anna mikkiä";
        } else if (error.message === "mic_unavailable") {
          finalStatus = "Mikki ei näy selaimelle";
        } else if (!line) {
          finalStatus = "TTS poikki";
        }
      } finally {
        callActive = false;
        busy = false;
        setState("idle", finalStatus);
      }
    }

    phoneButton.addEventListener("click", beginCall);
    callButton.addEventListener("click", beginCall);

    repeatButton.addEventListener("click", async () => {
      if (!lastReply || busy) return;
      busy = true;
      try {
        await speak(lastReply);
      } catch {
        setState("idle", "TTS poikki");
      } finally {
        busy = false;
        setState("idle", "Linja vapaa");
      }
    });

    stopButton.addEventListener("click", () => {
      callActive = false;
      stopAudio();
      if (recognition) recognition.abort();
      busy = false;
      setState("idle", "Linja vapaa");
    });

    setState("idle", "Linja vapaa");
  </script>
</body>
</html>
